# Phase2：改盒子 -> gmx 填充 W -> 删掉气泡内溶剂(建议仅W) -> 先 genion -neutral，再 genion -conc

# 与 phase1.yaml 中 peg.vacuum_run_dir 保持一致（相对 PEG2LNB 根目录）
phase1_run_dir: "output/phase1"
phase2_run_dir: "output/phase2"

# 按顺序选用 phase1_run_dir 下第一个存在的文件；都不存在则回退为 system.gro
dry_gro_candidates: ["system_fix.gro", "system.gro", "equilibration_1.gro"]

target_box_nm: 40.0
bubble_radius_nm: 12.0
salt_conc_m: 0.15

# 气泡质心用于距离判定（不含 PEG、不含 O2）
center_resnames: ["DPPC"]

# 删泡内溶剂：仅中和流程下建议只删 W（加盐前无 NA/CL）
remove_resnames_inside_radius: ["W"]

# 用于 gmx genion 交互选择的组名（你的 Martini 水组名是 W）
genion_solvent_group: "W"

gas: "O2"  # 生成 ndx 的气体组名（残基名）

# Martini 水坐标文件（resname 必须是 W）
solvent_cs_gro: "default/shared_assets/martini_W.gro"

