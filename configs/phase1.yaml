# Phase1：从 LNB-MDT 构建脂质纳气泡 -> DSPE 生长 PEG -> 去除全部水/离子 -> 真空体系模拟

# 1) LNB-MDT（lnb_gener_martini3.py）生成的工作目录
work_dir: "work/phase1_build"

# 2) 调 lnb_gener_martini3.py 的参数
lnb_build:
  distance: 1               # -d
  radius: 10                # -r
  box: 30                   # -x/-y/-z
  area_per_lipid: 1.0      # -a
  solvent: "W"             # -sol
  salt: 0.15               # -salt
  lipids:
    DPPC: 75
    DSPE: 10
    CHOL: 15
  gas: "O2"                # -gas
  gas_num: 5000           # -gas_num

# 3) PEG 生长与真空化（调用 version3/pipe.py）
peg:
  sphere_center: "auto"
  dppe_to_peg: "all"       
  head_resname: "DSPE"     # 需要修饰的磷脂名称
  peg_length: 12           # PEG 长度
  peg_resname: "12PEG"     # PEG 残基名
  peg_bond_length_nm: 0.36  # PEG 与磷脂之间的键长

  # pipe.py 生成 vacuum 体系的输出目录（相对 PEG2LNB 根目录；可改为任意子目录）
  vacuum_run_dir: "output/phase1"
  output_gro: "system_peg.gro"
  output_top: "system_peg.top"

  # 是否对几何重叠做修复（有助于 min 报错的稳定性）
  fix_overlap_enable: true

